<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Adventures 🌟</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-1: #FFF6E9;
      --bg-gradient-2: #FFE4D6;
      --card-bg: #FFFFFF;
      --text-primary: #2D3436;
      --text-secondary: #636E72;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Floating decorations */
    .decoration {
      position: fixed;
      pointer-events: none;
      opacity: 0.6;
      z-index: 0;
    }

    .decoration.coin1 { top: 10%; left: 5%; font-size: 40px; animation: float 4s ease-in-out infinite; }
    .decoration.coin2 { top: 30%; right: 8%; font-size: 32px; animation: float 5s ease-in-out infinite 0.5s; }
    .decoration.coin3 { bottom: 20%; left: 10%; font-size: 36px; animation: float 4.5s ease-in-out infinite 1s; }
    .decoration.star1 { top: 15%; right: 15%; font-size: 28px; animation: twinkle 2s ease-in-out infinite; }
    .decoration.star2 { bottom: 30%; right: 5%; font-size: 24px; animation: twinkle 2.5s ease-in-out infinite 0.3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      padding: 30px 0;
    }

    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      color: var(--text-primary);
      text-shadow: 3px 3px 0 #FFD93D;
      margin-bottom: 10px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 600;
    }

    .topic-grid {
      display: grid;
      gap: 24px;
      margin-top: 30px;
    }

    .topic-card {
      background: var(--card-bg);
      border: none;
      border-radius: 28px;
      padding: 40px 35px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 25px;
      text-align: left;
      width: 100%;
      text-decoration: none;
    }

    .topic-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .topic-card .topic-icon {
      font-size: 3.5rem;
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      flex-shrink: 0;
    }

    .topic-card.mlt .topic-icon { background: linear-gradient(135deg, #FFE66D, #FFB347); }
    .topic-card.tri .topic-icon { background: linear-gradient(135deg, #A78BFA, #6366F1); }

    .topic-card .topic-text h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.7rem;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .topic-card .topic-text p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .app-footer {
      text-align: center;
      padding: 24px 16px 16px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 2rem; }
      .topic-card { padding: 28px 22px; gap: 18px; }
      .topic-card .topic-icon { width: 70px; height: 70px; font-size: 2.6rem; }
      .topic-card .topic-text h2 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <!-- Floating decorations -->
  <div class="decoration coin1">🪙</div>
  <div class="decoration coin2">🪙</div>
  <div class="decoration coin3">💰</div>
  <div class="decoration star1">⭐</div>
  <div class="decoration star2">✨</div>

  <div class="container">
    <header class="header">
      <h1>Math Adventures 🌟</h1>
      <p>Choose a topic to get started!</p>
    </header>

    <div class="topic-grid">
      <a class="topic-card mlt" href="more-less-or-times.html">
        <div class="topic-icon">🪙</div>
        <div class="topic-text">
          <h2>More, Less, or Times?</h2>
          <p>Learn the magic words in math problems and solve comparison puzzles</p>
        </div>
      </a>

      <a class="topic-card tri" href="triangles.html">
        <div class="topic-icon">🔺</div>
        <div class="topic-text">
          <h2>Triangle Explorer</h2>
          <p>Discover and classify triangles by their sides and angles</p>
        </div>
      </a>
    </div>
  </div>

  <footer class="app-footer">v1.1.1</footer>
</body>
</html>
